# 多模态图表数据生成系统 - 深度Prompt工程配置
# 专门针对流程图/DOT/XML图表优化的提示词模板

v2t_prompts:
  # 流程图结构描述
  structure_description: |
    作为图表分析专家，请详细分析这张流程图的整体结构：
    1. 识别并列出所有节点类型（开始、结束、处理、判断等）
    2. 描述节点之间的连接关系和流向路径
    3. 解释使用的图形符号含义（矩形=处理，菱形=判断，箭头=流向）
    4. 标明整体的开始节点和结束节点
    5. 识别任何并行处理或循环结构

  # 节点关系分析
  node_relationships: |
    作为系统架构师，深度分析这张流程图中节点之间的关系：
    1. 找出所有的条件判断节点（菱形）及其分支条件
    2. 识别循环结构并说明循环条件和退出机制
    3. 描述每个节点的输入输出关系和数据处理逻辑
    4. 找出关键决策点和业务规则节点
    5. 分析节点之间的依赖关系和执行顺序

  # 流程逻辑提取
  logic_extraction: |
    作为业务分析师，提取这张流程图的核心业务逻辑：
    1. 用自然语言描述完整的端到端执行流程
    2. 详细说明每个处理步骤的具体功能和业务含义
    3. 识别正常流程路径和异常处理路径
    4. 总结整个流程的设计意图和解决的业务问题
    5. 评估流程的完整性和潜在优化点

  # 深度语义理解与问答对生成
  semantic_understanding: |
    作为资深系统分析师，请深度分析此流程图并生成高质量训练数据。
    
    分析要求：
    - 采用层次化描述：先整体架构，后模块细节
    - 包含因果推理：解释节点连接的原因和业务逻辑
    - 进行错位验证：主动检查并说明图的完整性和一致性
    
    输出格式（必须严格遵守）：
    {
      "chart_type": "流程图具体类型",
      "global_goal": "此流程图要解决的顶层业务问题",
      "key_modules": ["模块1", "模块2", "模块3"],
      "detailed_description": "完整的结构化描述文本",
      "validation_check": "一致性检查结果",
      "qa_pairs": [
        {
          "question": "基于流程图的多角度自然语言问题",
          "answer": "精准、无幻觉的详细答案",
          "difficulty": "easy/medium/hard"
        }
      ]
    }

t2v_prompts:
  # 系统架构图生成
  system_design: |
    根据以下系统描述，生成对应的架构流程图XML结构：
    
    系统描述：{{system_description}}
    
    生成要求：
    - 使用标准的BPMN 2.0图形符号规范
    - 确保每个组件都有唯一ID和清晰的功能标签
    - 明确标注组件之间的数据流向和依赖关系
    - 包含必要的开始和结束节点
    - 输出格式为draw.io兼容的XML

  # 业务流程生成
  workflow: |
    为以下业务流程生成详细的流程图：
    
    流程名称：{{process_name}}
    业务描述：{{business_description}}
    
    生成约束：
    - 包含完整的开始、处理、判断、结束节点
    - 准确反映业务规则和条件分支
    - 使用标准流程图符号体系
    - 确保逻辑完整性和路径可达性
    - 输出为结构化DOT格式

  # 算法流程图生成
  algorithm: |
    根据算法描述生成对应的执行流程图：
    
    算法名称：{{algorithm_name}}
    算法描述：{{algorithm_description}}
    
    技术要求：
    - 准确表达算法核心逻辑和步骤
    - 清晰展示循环结构和终止条件
    - 包含输入输出处理节点
    - 使用计算机算法标准表示法
    - 输出为包含详细注释的DOT格式

validation_prompts:
  # 一致性检查
  consistency_check: |
    作为质量保证专家，检查以下描述是否与流程图一致：
    
    流程图描述：{{description}}
    实际流程图：{{graph_structure}}
    
    请验证以下内容：
    1. 节点数量和类型是否匹配
    2. 连接关系和流向是否正确
    3. 循环和分支结构是否一致
    4. 开始结束节点是否对应
    5. 业务逻辑是否准确反映

  # 错误检测
  error_detection: |
    作为系统审计员，找出流程图中的潜在问题和错误：
    
    分析图表：{{graph_data}}
    
    检查项：
    1. 是否存在孤立的未连接节点
    2. 是否存在无限循环或无法退出的路径
    3. 所有分支路径是否都有明确的出口
    4. 条件判断是否覆盖所有可能情况
    5. 是否存在逻辑矛盾或冗余节点

  # 多轮对话验证
  clarification_round: |
    这是关于流程图的对话上下文分析任务。
    
    当前问题：{{current_question}}
    对话历史：{{chat_history}}
    流程图结构：{{graph_structure}}
    
    你的任务：
    1. 首先验证用户问题是否基于对流程图的正确理解
    2. 如果存在误解，先友好澄清后再提供正确答案
    3. 如果理解正确，直接给出准确丰富的答案
    4. 在回答中引用图中的具体节点ID增强可信度
    5. 确保答案完全基于流程图内容，不添加外部知识

  # 迭代调试
  iterative_debugging: |
    图表生成质量改进任务：
    
    原始描述：{{original_description}}
    生成的图表：{{generated_graph}}
    不一致反馈：{{feedback}}
    
    请执行：
    1. 具体分析不一致点的根本原因
    2. 重新生成修正后的图表描述
    3. 说明所做的修改和改进
    4. 确保新描述能准确生成目标图表

# 多样性控制参数
diversity_controls:
  low_diversity:
    temperature: 0.2
    description: "低多样性模式，生成结果高度一致和确定"

  medium_diversity:
    temperature: 0.6
    description: "中等多样性模式，平衡一致性和创造性"

  high_diversity:
    temperature: 0.9
    description: "高多样性模式，最大化生成结果的多样性"

# 错误信息和处理策略
error_messages:
  invalid_graph:
    message: "输入的图表格式不支持或无法解析"
    recovery: "请检查图表格式是否为支持的DOT/XML格式"

  api_timeout:
    message: "图表处理超时，请尝试简化流程图复杂度"
    recovery: "建议拆分复杂流程为多个子流程处理"

  parsing_failed:
    message: "无法正确解析图表结构"
    recovery: "请验证图表是否符合规范标准"

  validation_failed:
    message: "双向校验未通过，生成质量不足"
    recovery: "建议调整生成参数或重新生成"

# 性能优化参数
performance_params:
  batch_size: 10
  timeout_seconds: 30
  max_retries: 3
  cache_enabled: true
